name: Frontend ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL objetivo para escaneo baseline"
        required: false
        default: "https://groomnest.com"
        type: string

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare report directory
        run: mkdir -p zap-report

      - name: Run ZAP baseline
        run: |
          docker run --rm \
            -v "${PWD}/zap-report:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${{ inputs.target_url }}" \
            -J report.json \
            -w report.md \
            -r report.html \
            -m 5 \
            -a

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-report/
          if-no-files-found: error
