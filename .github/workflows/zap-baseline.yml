name: Frontend ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL objetivo para escaneo baseline"
        required: false
        default: "https://groomnest.com"
        type: string

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ZAP baseline
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url }}
          cmd_options: "-a -m 5"
          artifact_name: zap-baseline-report
          allow_issue_writing: false
          allow_comment_writing: false
