name: Frontend Smoke

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      remote:
        description: "Ejecutar contra una URL remota en lugar de preview local"
        required: false
        default: false
        type: boolean
      base_url:
        description: "URL frontend para smoke remoto"
        required: false
        default: "https://groomnest.com"
        type: string
      api_url:
        description: "URL backend para smoke remoto"
        required: false
        default: "https://api.groomnest.com"
        type: string

jobs:
  smoke-local:
    if: github.event_name != 'workflow_dispatch' || inputs.remote == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run smoke test against preview
        run: npm run smoke:ci
        env:
          SMOKE_BARBER_EMAIL: ${{ secrets.SMOKE_BARBER_EMAIL }}
          SMOKE_BARBER_PASSWORD: ${{ secrets.SMOKE_BARBER_PASSWORD }}
          SMOKE_VERCEL_PROTECTION_BYPASS: ${{ secrets.SMOKE_VERCEL_PROTECTION_BYPASS }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-local
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  smoke-remote:
    if: github.event_name == 'workflow_dispatch' && inputs.remote == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke test against remote URL
        run: npm run smoke -- --remote --skip-build --base-url=${{ inputs.base_url }} --api-url=${{ inputs.api_url }}
        env:
          SMOKE_BARBER_EMAIL: ${{ secrets.SMOKE_BARBER_EMAIL }}
          SMOKE_BARBER_PASSWORD: ${{ secrets.SMOKE_BARBER_PASSWORD }}
          SMOKE_VERCEL_PROTECTION_BYPASS: ${{ secrets.SMOKE_VERCEL_PROTECTION_BYPASS }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-remote
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
